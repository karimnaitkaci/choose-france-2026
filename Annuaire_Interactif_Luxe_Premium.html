<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annuaire Interactif Premium - Base Recrutement Luxe</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Roboto:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #fefdfb 0%, #f9f7f2 100%);
            color: #2a2a2a;
        }

        /* Luxury Header */
        .header {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            padding: 50px 40px;
            color: white;
            border-bottom: 4px solid #d4af37;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(212,175,55,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .header-content {
            position: relative;
            z-index: 1;
        }

        .header-title {
            font-family: 'Lora', serif;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header-subtitle {
            font-size: 14px;
            color: #d4af37;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .stats {
            display: flex;
            gap: 50px;
            margin-top: 30px;
            font-size: 13px;
            color: #ccc;
            padding-top: 30px;
            border-top: 2px solid rgba(212,175,55,0.4);
        }

        .stat-item {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .stat-number {
            color: #d4af37;
            font-weight: 700;
            font-size: 24px;
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
            padding: 40px;
            min-height: calc(100vh - 200px);
        }

        .sidebar {
            background: white;
            border-radius: 12px;
            padding: 35px;
            height: fit-content;
            position: sticky;
            top: 40px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            border-top: 4px solid #d4af37;
        }

        .filter-title {
            font-family: 'Lora', serif;
            font-size: 14px;
            font-weight: 700;
            color: #1a1a1a;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid #d4af37;
        }

        .search-box {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e8e8e8;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 25px;
            font-family: 'Roboto', sans-serif;
            background: #fafafa;
            transition: all 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: #d4af37;
            background: white;
            box-shadow: 0 0 0 3px rgba(212,175,55,0.15);
        }

        .filter-group {
            margin-bottom: 25px;
        }

        .filter-label {
            font-size: 11px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .main-content {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            border-top: 4px solid #d4af37;
        }

        .tree-container {
            font-size: 14px;
        }

        .tree-group {
            margin-bottom: 28px;
        }

        .group-toggle {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: linear-gradient(135deg, #f8f6f1 0%, #f0ede6 100%);
            border-left: 5px solid #d4af37;
            cursor: pointer;
            border-radius: 6px;
            user-select: none;
            font-weight: 600;
            color: #1a1a1a;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .group-toggle::before {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(212,175,55,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .group-toggle:hover {
            background: linear-gradient(135deg, #f0ede6 0%, #e8e3d8 100%);
            box-shadow: 0 4px 12px rgba(212,175,55,0.12);
        }

        .group-toggle .arrow {
            display: inline-block;
            margin-right: 12px;
            font-size: 12px;
            transition: transform 0.3s;
            color: #b8860b;
            font-weight: 700;
        }

        .group-toggle.collapsed .arrow {
            transform: rotate(-90deg);
        }

        .group-count {
            margin-left: auto;
            font-size: 12px;
            color: #999;
            background: rgba(212,175,55,0.1);
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 500;
        }

        .group-content {
            padding-left: 0;
            margin-top: 12px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            animation: slideDown 0.3s ease-out;
        }

        .group-content.collapsed {
            display: none;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .contact-card {
            background: linear-gradient(135deg, #fefdfb 0%, #faf9f7 100%);
            border: 2px solid #e8e3d8;
            border-radius: 10px;
            padding: 22px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .contact-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #d4af37 0%, #b8860b 100%);
        }

        .contact-card:hover {
            border-color: #d4af37;
            box-shadow: 0 8px 20px rgba(212,175,55,0.15);
            transform: translateY(-2px);
        }

        .contact-header {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            align-items: flex-start;
        }

        .contact-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .contact-info-top {
            flex: 1;
        }

        .contact-name {
            font-size: 15px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .contact-role {
            font-size: 12px;
            color: #666;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .contact-details {
            font-size: 11px;
            color: #999;
        }

        .contact-details-item {
            margin-bottom: 4px;
        }

        .linkedin-link {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 14px;
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .linkedin-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(184,134,11,0.3);
        }

        /* Comments Section */
        .comments-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px solid #e8e3d8;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .comments-section.expanded {
            max-height: 600px;
        }

        .comments-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #b8860b;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }

        .comments-toggle:hover {
            color: #d4af37;
        }

        .comments-toggle .arrow {
            transition: transform 0.3s;
            display: inline-block;
            font-size: 10px;
        }

        .comments-section.expanded .arrow {
            transform: rotate(90deg);
        }

        .comments-list {
            margin-bottom: 12px;
            max-height: 250px;
            overflow-y: auto;
        }

        .comment {
            background: #f9f7f2;
            padding: 10px 12px;
            border-radius: 4px;
            margin-bottom: 8px;
            border-left: 3px solid #d4af37;
            font-size: 12px;
            line-height: 1.5;
            color: #444;
        }

        .comment-date {
            font-size: 10px;
            color: #999;
            margin-top: 4px;
        }

        .comment-input-container {
            display: flex;
            gap: 8px;
        }

        .comment-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #e8e3d8;
            border-radius: 4px;
            font-size: 12px;
            font-family: 'Roboto', sans-serif;
            resize: none;
            height: 60px;
        }

        .comment-input:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 0 2px rgba(212,175,55,0.1);
        }

        .comment-submit {
            padding: 8px 12px;
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .comment-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(184,134,11,0.3);
        }

        .footer {
            padding: 30px 40px;
            text-align: center;
            color: #999;
            font-size: 12px;
            border-top: 2px solid #e8e3d8;
            margin-top: 50px;
        }

        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #b8860b;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="header-title">Annuaire Premium</div>
            <div class="header-subtitle">Base de Recrutement Luxe</div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="total-contacts">0</div>
                    <div class="stat-label">Contacts</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="total-brands">0</div>
                    <div class="stat-label">Marques</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="total-groups">0</div>
                    <div class="stat-label">Groupes</div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="sidebar">
            <div class="filter-title">🔍 Recherche</div>
            <input type="text" id="search-input" class="search-box" placeholder="Nom, entreprise, secteur...">

            <div class="filter-group">
                <button class="linkedin-link" onclick="expandAll()" style="width: 100%; margin-top: 0;">
                    ▼ Tout déplier
                </button>
            </div>
            <div class="filter-group">
                <button class="linkedin-link" onclick="collapseAll()" style="width: 100%; margin-top: 8px;">
                    ▶ Tout replier
                </button>
            </div>
        </div>

        <div class="main-content">
            <div class="tree-container" id="tree-container"></div>
        </div>
    </div>

    <div class="footer">
        <p>Annuaire Interactif © 2026 | Recrutement Luxe & Executive Search</p>
    </div>

    <script>
        // Luxury color palette for avatars
        const luxuryColors = [
            '#8B4513', '#DAA520', '#CD853F', '#BC8F8F', '#D2691E',
            '#B8860B', '#8B7D6B', '#A0826D', '#8B7D6B', '#7A6B63',
            '#9D4E6C', '#7B68EE', '#4B0082', '#2F4F4F', '#556B2F'
        ];

        function getAvatarColor(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            return luxuryColors[Math.abs(hash) % luxuryColors.length];
        }

        function getComments(contactId) {
            const comments = localStorage.getItem(`comments_${contactId}`);
            return comments ? JSON.parse(comments) : [];
        }

        function addComment(contactId, comment) {
            if (comment.trim() === '') return;
            const comments = getComments(contactId);
            comments.push({
                text: comment,
                date: new Date().toLocaleDateString('fr-FR', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                })
            });
            localStorage.setItem(`comments_${contactId}`, JSON.stringify(comments));
            renderComments(contactId);
        }

        function renderComments(contactId) {
            const comments = getComments(contactId);
            const commentsList = document.getElementById(`comments-list-${contactId}`);
            if (!commentsList) return;

            commentsList.innerHTML = comments.map((c, i) => `
                <div class="comment">
                    ${c.text}
                    <div class="comment-date">${c.date}</div>
                </div>
            `).join('');
        }

        function toggleComments(element, contactId) {
            const section = element.closest('.comments-section');
            section.classList.toggle('expanded');

            if (section.classList.contains('expanded')) {
                renderComments(contactId);
                setTimeout(() => {
                    const input = document.getElementById(`comment-input-${contactId}`);
                    if (input) input.focus();
                }, 100);
            }
        }

        function submitComment(contactId) {
            const input = document.getElementById(`comment-input-${contactId}`);
            if (input) {
                addComment(contactId, input.value);
                input.value = '';
            }
        }

        function loadData() {
            const groupedByGroupe = {};

            for (const contact of contactsData) {
                const groupe = contact.Groupe || 'Indépendant';
                if (!groupedByGroupe[groupe]) {
                    groupedByGroupe[groupe] = {};
                }

                const marque = contact.Marque || 'Autres';
                if (!groupedByGroupe[groupe][marque]) {
                    groupedByGroupe[groupe][marque] = [];
                }

                groupedByGroupe[groupe][marque].push(contact);
            }

            // Update stats
            document.getElementById('total-contacts').textContent = contactsData.length;
            document.getElementById('total-groups').textContent = Object.keys(groupedByGroupe).length;
            let totalBrands = 0;
            for (const groupe in groupedByGroupe) {
                totalBrands += Object.keys(groupedByGroupe[groupe]).length;
            }
            document.getElementById('total-brands').textContent = totalBrands;

            renderTree(groupedByGroupe);
        }

        function renderTree(groupedData) {
            const container = document.getElementById('tree-container');
            let html = '';

            for (const [groupe, brands] of Object.entries(groupedData).sort()) {
                const totalInGroup = Object.values(brands).reduce((sum, arr) => sum + arr.length, 0);

                html += `
                    <div class="tree-group">
                        <div class="group-toggle" onclick="toggleGroup(this)">
                            <span class="arrow">▶</span>
                            <span style="position: relative; z-index: 1;">${groupe}</span>
                            <span class="group-count">${totalInGroup}</span>
                        </div>
                        <div class="group-content">
                `;

                for (const [brand, contacts] of Object.entries(brands).sort()) {
                    for (const contact of contacts) {
                        const initials = (contact.Prénom[0] + contact.Nom[0]).toUpperCase();
                        const avatarColor = getAvatarColor(contact.Prénom + contact.Nom);
                        const contactId = `${contact.Prénom}_${contact.Nom}_${contact.Marque}`.replace(/\s+/g, '_');

                        html += `
                            <div class="contact-card">
                                <div class="contact-header">
                                    <div class="contact-avatar" style="background: ${avatarColor};">
                                        ${initials}
                                    </div>
                                    <div class="contact-info-top">
                                        <div class="contact-name">${contact.Prénom} ${contact.Nom}</div>
                                        <div class="contact-role">${contact["Poste Exact"]}</div>
                                        <div class="contact-details">
                                            <div class="contact-details-item"><strong>📍</strong> ${brand}</div>
                                            <div class="contact-details-item"><strong>🏢</strong> ${groupe}</div>
                                        </div>
                                        <a href="${contact['LinkedIn URL Profil']}" target="_blank" class="linkedin-link">
                                            🔗 Profil LinkedIn
                                        </a>
                                    </div>
                                </div>

                                <div class="comments-section" id="comments-section-${contactId}">
                                    <div class="comments-toggle" onclick="toggleComments(this, '${contactId}')">
                                        <span class="arrow">▶</span>
                                        <span>Commentaires</span>
                                    </div>
                                    <div class="comments-list" id="comments-list-${contactId}"></div>
                                    <div class="comment-input-container">
                                        <textarea id="comment-input-${contactId}" class="comment-input" placeholder="Ajouter une note..."></textarea>
                                        <button class="comment-submit" onclick="submitComment('${contactId}')">Ajouter</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                }

                html += `
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        function toggleGroup(element) {
            const content = element.nextElementSibling;
            element.classList.toggle('collapsed');
            content.classList.toggle('collapsed');
        }

        function expandAll() {
            document.querySelectorAll('.group-toggle').forEach(el => {
                el.classList.remove('collapsed');
                if (el.nextElementSibling) {
                    el.nextElementSibling.classList.remove('collapsed');
                }
            });
        }

        function collapseAll() {
            document.querySelectorAll('.group-toggle').forEach(el => {
                el.classList.add('collapsed');
                if (el.nextElementSibling) {
                    el.nextElementSibling.classList.add('collapsed');
                }
            });
        }

        function filter() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const cards = document.querySelectorAll('.contact-card');

            cards.forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(searchTerm) ? '' : 'none';
            });
        }

        // Event listeners
        document.getElementById('search-input').addEventListener('input', filter);

        // Initialize
        loadData();
    </script>
