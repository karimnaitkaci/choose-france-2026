<!DOCTYPE html>
<html lang="fr">
<head>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #002b80 0%, #1e5a96 100%);
            color: white;
            padding: 20px 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header .subtitle {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 320px;
            background: white;
            border-right: 1px solid #ddd;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar h2 {
            font-size: 16px;
            color: #002b80;
            margin-bottom: 12px;
            border-bottom: 2px solid #002b80;
            padding-bottom: 8px;
        }

        .filter-group {
            margin-bottom: 16px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            color: #666;
        }

        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: #1e5a96;
            box-shadow: 0 0 0 2px rgba(30, 90, 150, 0.1);
        }

        .btn-reset {
            width: 100%;
            padding: 10px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-reset:hover {
            background: #e0e0e0;
            border-color: #999;
        }

        .stats-section {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
        }

        .stat-value {
            font-weight: bold;
            color: #1e5a96;
            font-size: 14px;
        }

        .projects-list-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .projects-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .project-item {
            padding: 10px;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
        }

        .project-item:hover {
            background: #f0f0f0;
            border-color: #1e5a96;
            transform: translateX(2px);
        }

        .project-item .client {
            font-weight: bold;
            color: #002b80;
            margin-bottom: 3px;
        }

        .project-item .location {
            font-size: 11px;
            color: #666;
        }

        .project-item .capex {
            font-weight: bold;
            color: #1e5a96;
            margin-top: 3px;
        }

        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .map {
            width: 100%;
            height: 100%;
        }

        .leaflet-popup-content {
            font-size: 12px;
            margin: 0 !important;
        }

        .popup-content {
            padding: 8px 0;
        }

        .popup-content .popup-client {
            font-weight: bold;
            color: #002b80;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .popup-section {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #eee;
        }

        .popup-section:last-child {
            border-bottom: none;
        }

        .popup-section-label {
            font-weight: bold;
            color: #666;
        }

        .popup-section-value {
            color: #333;
            text-align: right;
            max-width: 150px;
        }

        .popup-description {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #eee;
            font-size: 11px;
            line-height: 1.4;
            max-height: 100px;
            overflow-y: auto;
        }

            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex !important;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            position: relative;

            right: 20px;

            font-weight: bold;
            cursor: pointer;
            color: #999;
        }

        }

            color: #002b80;
            margin-bottom: 15px;
            font-size: 20px;
        }

        #modal-body .detail-section {
            margin-bottom: 15px;
        }

        #modal-body .detail-label {
            font-weight: bold;
            color: #666;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        #modal-body .detail-value {
            color: #333;
            font-size: 13px;
            line-height: 1.5;
        }

        #capex-value {
            margin-left: 8px;
            font-weight: bold;
            color: #1e5a96;
        }

        @media (max-width: 768px) {
            .content {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                max-height: 300px;
                border-right: none;
                border-bottom: 1px solid #ddd;
            }

            .projects-list-section {
                display: none;
            }

            .header h1 {
                font-size: 20px;
            }

            .header .subtitle {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🇫🇷 Choose France 2026</h1>
            <p class="subtitle">Opportunités d'investissement - Sommet de Versailles (1er juin 2026)</p>
        </header>

        <div class="content">

                <div class="filters-section">
                    <h2>Filtres</h2>

                    <div class="filter-group">

                        <select id="sector-filter">
                            <option value="">-- Tous les secteurs --</option>

                    </div>

                    <div class="filter-group">
                        <label for="region-filter"><strong>Région</strong></label>
                        <select id="region-filter">
                            <option value="">-- Toutes les régions --</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label for="capex-filter"><strong>CAPEX minimum (Md€)</strong></label>
                        <input type="range" id="capex-filter" min="0" max="100" value="0" step="5">
                        <span id="capex-value">0</span>
                    </div>

                    <button id="reset-filters" class="btn-reset">Réinitialiser les filtres</button>
                </div>

                <div class="stats-section">
                    <h2>Statistiques</h2>
                    <div class="stat-item">
                        <span class="stat-label">Projets affichés</span>
                        <span class="stat-value" id="projects-count">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">CAPEX total</span>
                        <span class="stat-value" id="capex-total">0</span> Md€
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Régions impliquées</span>
                        <span class="stat-value" id="regions-count">0</span>
                    </div>
                </div>

                <div class="projects-list-section">
                    <h2>Projets</h2>
                    <div id="projects-list" class="projects-list"></div>
                </div>
            </aside>

            <main class="main-content">
                <div id="map" class="map"></div>
            </main>
        </div>

        <div id="project-modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <div id="modal-body"></div>
            </div>
        </div>
    </div>

tion jobs and 2,400 permanent indirect jobs.", "existing": "Yes, investing in France since 2015 with over 7,000 employees through portfolio companies: Data4 (acquired 2023, three data center campuses around Paris, circa 375 MW), Neoen (Paris-based renewables, 6.1 Md\u20ac deal in 2024), TDF telecom towers, HomeServe France, Castignac and UXCO. Also opened a dedicated Paris office hub in December 2024.", "lat": 50.1833, "lng": 3.2333}, {"id": 4, "sector": "Data Center / AI", "client": "Nebius", "citizenship": "Dutch", "location": "B\u00e9thune", "region": "Hauts-de-France", "capex": 8.0, "capex_display": "8 Md\u20ac", "description": "Converts the former Bridgestone brownfield site in B\u00e9thune into a major European AI computing site with an integrated infrastructure-to-cloud model. Over 8 Md\u20ac invested over several years for a target capacity of 240 MW, with a first phase in 2026 and full ramp-up in 2027, generating about 120 jobs plus AI training via the Nebius Academy.", "existing": "Yes, Nebius has operated an AI GPU cluster in France since November 2024, hosted in colocation at the Equinix PA10 campus in Saint-Denis (Paris), among the first in Europe with NVIDIA H200 GPUs. It was launched as part of a 1 Bn USD European AI infrastructure plan, but Bethune is its first owned large-scale data center in France.", "lat": 50.5333, "lng": 2.65}, {"id": 5, "sector": "Data Center / AI", "client": "MGX / Bpifrance", "citizenship": "Emirati / French", "location": "Fouju (Seine-et-Marne), second site to be selected", "region": "\u00cele-de-France", "capex": 0, "capex_display": "7,5 Md\u20ac", "description": "Extension of Campus AI, a joint venture with Mistral AI and NVIDIA, targeting up to 3 GW of low-carbon AI infrastructure capacity in France. After the Fouju campus currently under construction, the imminent selection of a second site represents an investment of about 7,5 Md\u20ac, creating up to 500 direct construction jobs and 700 permanent direct jobs.", "existing": "Yes. Bpifrance is the French state investment bank headquartered in Paris, and Abu Dhabi fund MGX entered France in February 2025 via the Campus AI joint venture with Mistral AI and NVIDIA, whose first 1.4 GW data center campus at Fouju (Seine-et-Marne) is in early construction with an RTE fast-track grid connection signed in January 2026. MGX has no completed operating site in France yet; this 2026 announcement extends that single project to a second site.", "lat": 48.8, "lng": 2.5}, {"id": 6, "sector": "Data Center / AI", "client": "Verne / Ardian", "citizenship": "British / French", "location": "\u00cele-de-France", "region": "\u00cele-de-France", "capex": 5.0, "capex_display": "5 Md\u20ac", "description": "Development of a next-generation digital infrastructure campus in \u00cele-de-France, designed as an AI Gigafactory hosting high-performance computing on low-carbon energy infrastructure. Up to 5 Md\u20ac investment for a target capacity of 500 MW, with a first tranche of about 250 MW by 2030 and around 330 jobs for site operations.", "existing": "Yes. Ardian is a Paris headquartered private equity firm with 70+ infrastructure investment professionals in France and French portfolio platforms such as Akuo and GreenYellow. Verne, its UK data center platform acquired in 2024, operates five campuses in London, Iceland and Finland, but this Ile-de-France campus is Verne's first data center project in France.", "lat": 48.5, "lng": 2.5}, {"id": 7, "sector": "Data Center / AI", "client": "Phoenix Group", "citizenship": "Emirati", "location": "Lyon area", "region": "Auvergne-Rh\u00f4ne-Alpes", "capex": 4.0, "capex_display": "4 Md\u20ac", "description": "In partnership with DC MAX, develops next-generation digital infrastructure in France and Europe. The first phase is an 18 MW data center campus in the Lyon area for an initial investment of over 100 M\u20ac; the French part of the European plan targets about 500 MW, representing up to 4 Md\u20ac of potential investment and 500 to 600 direct and indirect jobs.", "existing": "First investment in France: the Lyon 18 MW campus with DC Max is Phoenix Group's inaugural European deployment (land secured, construction from July 2026). Its existing ~550 MW of capacity (Bitcoin mining and HPC, founded 2017, Abu Dhabi listed) is located in the UAE, Oman, North America and Ethiopia.", "lat": 45.764, "lng": 4.8357}, {"id": 8, "sector": "Data Center / AI", "client": "SAP", "citizenship": "German", "location": "\u00cele-de-France", "region": "\u00cele-de-France", "capex": 0, "capex_display": "300 M\u20ac", "description": "Reaffirms its long-term commitment to France with about 100 M\u20ac invested over the first three years within a broader 300 M\u20ac plan to 2032, supporting a sovereign SAP cloud and Business AI region with three data center sites planned in \u00cele-de-France for Q1 2027 targeting SecNumCloud qualification, and creating about a hundred high-value cloud and AI jobs.", "existing": "Yes, SAP France has operated since 1990 with its headquarters in Levallois-Perret (around 1,600 employees) and an Experience Center opened in 2014. Its R&D arm SAP Labs France runs sites in Levallois-Perret, Mougins (Sophia Antipolis) and Caen, the latter from a local company acquisition.", "lat": 48.5, "lng": 2.5}, {"id": 9, "sector": "Data Center / AI", "client": "Foxconn / Bull", "citizenship": "Taiwanese / French", "location": "Angers", "region": "Pays de la Loire", "capex": 0, "capex_display": "120 M\u20ac", "description": "Partnership focused on AI factories and infrastructure in Europe, anchoring the AI supply chain and sovereign computing capacity in France, with an initial investment of more than 120 M\u20ac. Certain high value-added server manufacturing steps will be located at the Bull plant in Angers.", "existing": "Yes through the French partner: Bull is a historic French computing manufacturer whose Angers plant (Pays de la Loire) builds BullSequana HPC/AI servers and will handle ine) and roughly 1,000 to 2,000 employees. It also runs two Oracle Cloud Infrastructure regions in France, opened in Marseille (2021) and Paris/La Courneuve (2022).", "lat": 48.8566, "lng": 2.3522}, {"id": 12, "sector": "Software / AI", "client": "Salesforce", "citizenship": "American", "location": "Paris", "region": "\u00cele-de-France", "capex": 2.0, "capex_display": "2 Md\u20ac", "description": "Announces an additional 2 Md\u20ac investment in France, including the opening in Paris of its first AI Innovation Hub in the European Union and major talent and ecosystem initiatives, with more than 2.2 M\u20ac of philanthropy for digital and AI skills training. This raises its previous five-year commitment from 3.5 to 5.5 billion dollars by 2030.", "existing": "Yes, Salesforce has operated in France since 2005, with its South EMEA headquarters in Paris (7th arrondissement) since 2014, offices in Lyon and Nantes, R&D centers in Paris and Grenoble, and roughly 1,700 employees. It also opened a Paris data center in 2016 and had committed $2.2 billion (2018) then $3.5 billion (2022) in successive five-year investment plans.", "lat": 48.8566, "lng": 2.3522}, {"id": 13, "sector": "AI / R&D", "client": "HPE", "citizenship": "American", "location": "Grenoble", "region": "Auvergne-Rh\u00f4ne-Alpes", "capex": 0, "capex_display": "350 M\u20ac", "description": "Invests 350 M\u20ac over 5 years in the AI Factory Lab in Grenoble created in partnership with Nvidia, consolidating the existing telecoms, AI and high-performance computing R&D center, equipping a new lab with the latest server, GPU and cooling technologies, and recruiting about 80 AI engineers for the Grenoble Global R&D Center.", "existing": "Yes, HPE (formerly HP) has operated in the Grenoble area since the early 1970s, with an existing Global R&D Center (about 300 employees) covering telecoms/5G software, high-performance computing and AI, plus some European corporate functions. The 2026 announcement consolidates and expands this existing site, which is relocating from Eybens to new premises in Saint-Martin-d'Heres by late 2026/early 2027.", "lat": 48.8, "lng": 2.5}, {"id": 14, "sector": "Software / AI", "client": "Databricks", "citizenship": "American", "location": "TBC", "region": "TBC", "capex": 0, "capex_display": "258 M\u20ac", "description": "Invests more than 258 M\u20ac in France over the next three years in talent, training and business development to help French companies deploy AI in production at scale. Plans to hire 200 people within three years and train more than 40,000 people in key data and AI skills by 2028, building on its University Alliance program with over 50 French universities.", "existing": "Yes, French subsidiary Databricks SARL registered in Paris since 2018, with a dedicated 1,000 m2 office at La Fondation (Paris 17e) opened in November 2024 housing about 150 employees. Serves 200+ French clients including SNCF, Michelin, TotalEnergies and L'Oreal, with 70%+ annualized growth reported in France.", "lat": 48.8, "lng": 2.5}, {"id": 15, "sector": "Tourism / Entertainment", "client": "E-Sport Foundation", "citizenship": "Saudi", "location": "Paris", "region": "\u00cele-de-France", "capex": 0, "capex_display": "250 M\u20ac", "description": "Investment of around 250 M\u20ac to organise the Esports World Cup in Paris this summer, covering infrastructure, production, accommodation, transport, broadcasting, ceremonies and fan activities, expected to generate about 600 M\u20ac in indirect economic benefits.", "existing": "First investment in France. The Saudi-backed Esports World Cup Foundation is headquartered in Riyadh, where it hosted the 2024 and 2025 editions of the Esports World Cup; the 2026 Paris edition (6 July to 23 August, Paris Expo Porte de Versailles) is its first event and project outside Saudi Arabia.", "lat": 48.8566, "lng": 2.3522}, {"id": 16, "sector": "Software / AI", "client": "Workday", "citizenship": "American", "location": "Paris, Lyon and Marseille", "region": "Multiple", "capex": 0, "capex_display": "200 M\u20ac", "description": "The HR, finance and payroll enterprise software leader invests more than 200 M\u20ac over three years to durably strengthen its presence in Paris, Lyon and Marseille, with continued headcount growth and structured partnerships with French technology players to develop controlled AI use cases.", "existing": "Yes, Workday France SAS has operated since 2013 with its main office in Paris (boulevard Haussmann, around 167 employees, circa 94 M\u20ac revenue FY2024-25), selling HR, finance and payroll software localized for France since 2016. Offices in Lyon and Marseille were announced in 2025 as part of a regional expansion preceding this 2026 commitment.", "lat": 48.8566, "lng": 2.3522}, {"id": 17, "sector": "Retail", "client": "Mango", "citizenship": "Spanish", "location": "TBC", "region": "Multiple", "capex": 0, "capex_display": "66 M\u20ac", "description": "Investment of 66 M\u20ac in France between 2026 and 2028 with the opening of 45 new stores, strengthening its retail network and creating local jobs; France is the group's largest international market.", "existing": "Yes, Mango has operated in France since 1994 and today runs a retail network of more than 250 stores across over 170 cities in all French regions, making France the group's largest international market. Its existing footprint is retail only (stores), with over 80% of locations in small and medium-sized cities; the new plan adds 45 stores and about 700 jobs by 2028.", "lat": 48.8, "lng": 2.5}, {"id": 18, "sector": "Retail", "client": "Ingka Group / IKEA", "citizenship": "Swedish", "location": "10 compact stores nationwide and Port Victor logistics platform (Paris 15e)", "region": "Multiple", "capex": 0, "capex_display": "35 M\u20ac", "description": "Additional 35 M\u20ac investment over 2026-2030 to open 10 compact-format IKEA stores in France, creating about 300 jobs, plus a new logistics platform at Port Victor in Paris to expand multimodal delivery via the Seine from the future Limay logistics centre, with last-mile electric vehicle delivery.", "existing": "Yes, IKEA has operated in France since 1981 (first store in Bobigny) and today runs 36 full-size stores plus compact stores, design studios and logistics depots, employing over 12,000 people with about EUR 3.7 bn FY24 retail revenue. The 2026 announcement extends ongoing projects, notably the Limay (78) logistics centre and the first compact stores (Limoges opened May 2026, Le Mans next).", "lat": 48.8566, "lng": 2.3522}, {"id": 19, "sector": "Semiconductors / High-tech manufacturing", "client": "Thales / Foxconn / Radiall (Tessalia)", "citizenship": "Taiwanese / French", "location": "Le Barp (near Bordeaux)", "region": "Nouvelle-Aquitaine", "capex": 0, "capex_display": "250 M\u20ac", "description": "Groundbreaking on 1 June 2026 of the Tessalia Technology SAS joint venture in Le Barp near Bordeaux, an OSAT facility for outsourced semiconductor assembly and testing; production should start in late 2029 and exceed 50 million SiP components per year by 2033, with investment potentially exceeding 250 M\u20ac by 2033 and around 800 jobs at full capacity.", "existing": "Yes for the two French partners: Thales (Paris-headquartered defence and electronics group with dozens of French sites and tens of thousands of employees in France) and Radiall (French connector maker founded in 1952 with several French plants, e.g. Chateau-Renault) have long-standing operations in France. Foxconn itself had no factory in France before Tessalia, its first French industrial site; its European manufacturing base has been Pardubice, Czech Republic (since 2000), plus Hungary and Slovakia.", "lat": 44.8378, "lng": -0.5792}, {"id": 20, "sector": "Defence and space", "client": "Venturi Space", "citizenship": "Monegasque", "location": "Toulouse", "region": "Occitanie", "capex": 0, "capex_display": "150 M\u20ac", "description": "Additional investment of 150 M\u20ac, bringing the total to 250 M\u20ac, to establish in Toulouse its new technology center for the design and manufacture of critical technologies and the assembly of its lunar and Martian rovers. Activity is accelerating after NASA selected the rover of strategic partner Venturi Astrolab to transport astronauts from 2028.", "existing": "Yes, subsidiary Venturi Space France has operated an engineering and R&D office in Toulouse since 2023 (registered company, SIREN 983759192), with around 40 employees since 2024 working on lunar rover technologies such as batteries and hyper-deformable wheels alongside the group's Monaco and Switzerland entities. The 2026 announcement scales this up into a 16,000 m2 technology and assembly center near CNES, targeted for 2028 with up to 200 staff.", "lat": 43.6047, "lng": 1.4422}, {"id": 21, "sector": "Defence and space", "client": "Tekever", "citizenship": "Portuguese", "location": "Toulouse and Cahors", "region": "Occitanie", "capex": 0, "capex_display": "100 M\u20ac", "description": "Investment of 100 M\u20ac in France over five years with 100 skilled jobs created, doubling the initiative announced in 2025 to a total of 200 M\u20ac and 200 jobs. The advanced autonomous systems group aims to make France an industrial, innovation and export pillar for its European activities, with its headquarters in Toulouse and the ramp-up of its Cahors industrial site.", "existing": "Yes, present since its Choose France 2025 pledge (100 M EUR, 100 jobs): a French headquarters office opened in Toulouse and a 4,500 m2 drone factory under development in Cahors (production from mid-2026, about 40 staff initially), with close to 100 employees in France expected by end 2026. The group also works with CNES and DGA on sovereign SAR satellite technology.", "lat": 43.6047, "lng": 1.4422}, {"id": 22, "sector": "Defence and space", "client": "PLD Space", "citizenship": "Spanish", "location": "Kourou (Centre Spatial Guyanais)", "region": "Guyane", "capex": 0, "capex_display": "35 M\u20ac", "description": "Investment of 35 M\u20ac in 2025-2026 to build and fit out its launch complex at the Guiana Space Centre in Kourou, generating about 21 M\u20ac of local added value, supporting 250 to 275 indirect jobs during construction and 35 direct jobs for recurring launch operations. First private operator to commit such investment on the ELM-Diamant zone.", "existing": "Yes, PLD Space has had a French subsidiary in Kourou since mid 2024, when it announced an initial 10 M EUR investment in its MIURA 5 launch complex on the ELM-Diamant zone of the Guiana Space Centre, and signed the CNES land-use contract in June 2025. The 2026 announcement raises that same project to 35 M EUR; it is the company's only French site, still under construction (civil works in final phase, completion expected summer 2026).", "lat": 48.8, "lng": 2.5}, {"id": 23, "sector": "Defence and space", "client": "Electro Optic Systems (EOS)", "citizenship": "Australian", "location": "Nice", "region": "Provence-Alpes-C\u00f4te d'Azur", "capex": 0, "capex_display": "10 M\u20ac", "description": "Investment of more than 10 M\u20ac to make France its European hub for counter-drone systems including AI-based command and control, through the establishment in Nice of the headquarters of recently acquired MARSS. Up to 150 jobs over three years, including high-value engineering and software development roles, with cooperation with KNDS and exploration of high-energy lasers and space warfare capabilities.", "existing": "First direct investment in France: EOS (HQ Canberra) previously operated in Australia, the US, UAE, Singapore and Germany, with no French sites of its own. Its French footprint comes solely via MARSS (counter-drone C2, HQ Monaco, ~80 staff, some assets in France), acquired in 2025-2026, whose headquarters is being relocated to the Nice area as part of this announcement.", "lat": 48.8, "lng": 2.5}, {"id": 24, "sector": "Industrial manufacturing", "client": "Smurfit Westrock", "citizenship": "Irish", "location": "Sites across France", "region": "Multiple", "capex": 0, "capex_display": "600 M\u20ac", "description": "Investment of nearly 600 M\u20ac in its French sites over the next three to five years to support the modernization and decarbonation of its sustainable paper packaging operations, improving production efficiency, customer innovation and sustainable packaging capabilities.", "existing": "Yes, a major historical operator with around 50 sites and 6,000 employees in France (corrugated packaging plants, paper mills, bag-in-box), operating as Smurfit Kappa until the July 2024 WestRock merger, including the Cellulose du Pin paper mill in Biganos present for nearly 100 years. The group also invested over 500 M\u20ac in its French operations during the five years before this announcement.", "lat": 48.8, "lng": 2.5}, {"id": 25, "sector": "Industrial manufacturing", "client": "Groupe Liebherr", "citizenship": "Swiss", "location": "Colmar", "region": "Grand Est", "capex": 0, "capex_display": "90 M\u20ac", "description": "Investment of about 90 M\u20ac at the Liebherr-Components Colmar site, specialized in the development, assembly and testing of high-power combustion engines. Production capacity will nearly double by 2030 to serve the strong global growth of data centers, creating more than 200 jobs on site.", "existing": "Yes, Liebherr has been established in Colmar since 1961 and employs over 3,000 people in the Colmar area across several plants (crawler excavators, mining excavators, and the Liebherr-Components high-power engine plant opened in 2011), plus Liebherr-Aerospace sites in Toulouse and Montauban and a new 170 M\u20ac plant under construction at Nambsheim. This 2026 announcement is an expansion of its existing Liebherr-Components Colmar site.", "lat": 48.8, "lng": 2.5}, {"id": 26, "sector": "Industrial manufacturing", "client": "Linde", "citizenship": "American", "location": "TBC", "region": "TBC", "capex": 0, "capex_display": "55 M\u20ac", "description": "Investment of about 55 M\u20ac to build, own and operate a new air separation unit (ASU) in France, expected to start up at the end of 2028. The unit will supply key chemical sector customers and provide liquid oxygen, nitrogen and argon to clients in pharmaceuticals, agrifood and healthcare.", "existing": "Yes, long established via Linde France SA (founded 1993, headquartered in Lyon), which operates about 12 establishments producing and distributing industrial and medical gases, including an existing air separation unit (Limes) at Saint-Herblain near Nantes inaugurated in 2010. Linde France employs roughly 535 people and generated about 352 M\u20ac revenue in 2024.", "lat": 48.8, "lng": 2.5}, {"id": 27, "sector": "Industrial manufacturing", "client": "Werhahn Group / Zwilling (STAUB)", "citizenship": "German", "location": "Merville", "region": "Hauts-de-France", "capex": 0, "capex_display": "42 M\u20ac", "description": "FutureFoundry project at the Merville site: construction of a state-of-the-art new foundry and installation of modern production equipment for the premium cast-iron cookware brand STAUB, with over 42 M\u20ac invested to shift to a significantly more energy-efficient, low-CO2 foundry technology.", "existing": "Yes, the investment targets STAUB's existing foundry in Merville (Hauts-de-France), a 1926-founded site that has been STAUB's main plant since 2002 and Zwilling-owned (Werhahn Group) since 2008, employing roughly 250-350 people and producing over 1 million cast-iron pieces per year. The group also runs a French sales subsidiary, Zwilling Staub France (Paris/Turckheim), and has invested around 30 M\u20ac in Merville since 2008.", "lat": 48.8, "lng": 2.5}, {"id": 28, "sector": "Industrial manufacturing", "client": "PPG", "citizenship": "American", "location": "Ruitz and Moreuil", "region": "Hauts-de-France", "capex": 0, "capex_display": "40 M\u20ac", "description": "Investment o description": "New milestone for the Mistral project at Fos-sur-Mer: after an initial 600 M\u20ac commitment announced in 2024, an additional 600 M\u20ac investment brings the total to about 1.2 Md\u20ac. The project will create the first steel mill built in France in more than 50 years and the first large rolling mill since then, an electric-route plant using AI and decarbonized electricity.", "existing": "Yes, a sales subsidiary (Marcegaglia France) near Lyon since the 1990s, plus the former Ascometal electric steel plant at Fos-sur-Mer acquired in May 2024 with all 323 employees retained. The 2026 announcement is an extension of the Mistral project on that same Fos-sur-Mer site, following the initial 600 M\u20ac commitment announced in 2024.", "lat": 48.8, "lng": 2.5}, {"id": 33, "sector": "Mining and Metals", "client": "USA Rare Earth", "citizenship": "American", "location": "Lacq", "region": "Nouvelle-Aquitaine", "capex": 0, "capex_display": "175 M\u20ac", "description": "Expansion of investments in rare earth metals, alloys and permanent magnet manufacturing, building on the Less Common Metals rare earth metals and alloys production unit in Lacq and a strategic investment in Carester SAS alongside InfraVia Capital Partners. Additional investments could exceed 175 M\u20ac by 2030 and create more than 200 additional jobs.", "existing": "Yes, recent but pre-existing footprint: its UK subsidiary Less Common Metals is building a 110 M EUR rare earth metals and alloys plant at Lacq (announced at Choose France 2025, about 80 jobs, commissioning expected 2027), and USAR acquired a circa 12.5 percent stake (about 47 M USD) in French refiner Carester SAS in April 2026 alongside InfraVia. No site was operational in France before this 2026 announcement; both projects were under construction or in execution.", "lat": 48.8, "lng": 2.5}, {"id": 34, "sector": "Energy / Renewables", "client": "EDP", "citizenship": "Portuguese", "location": "Across France", "region": "Multiple", "capex": 0, "capex_display": "1,3 Md\u20ac", "description": "Announcement of 1.3 Md\u20ac of new investments in France by 2030, after more than 2.7 Md\u20ac already invested and 1.4 GW installed nationwide. Projects cover onshore and offshore wind, solar, battery storage and grid infrastructure, contributing to France's energy sovereignty and competitive low-carbon electricity supply.", "existing": "Yes, EDP has operated in France since 2008 through EDP Renewables France (Paris HQ plus a Millau office), running 60+ onshore wind and solar farms across about 30 departments, with more than 2.7 bn euros already invested and 1.4 GW installed. It also holds offshore wind assets via Ocean Winds, its JV with ENGIE, including the commissioned 500 MW Yeu-Noirmoutier farm and the 30 MW EFGL floating pilot.", "lat": 48.8, "lng": 2.5}, {"id": 35, "sector": "Energy / Renewables", "client": "Enertrag", "citizenship": "German", "location": "Hauts-de-France and Nouvelle-Aquitaine hubs", "region": "Multiple", "capex": 0, "capex_display": "1,1 Md\u20ac", "description": "Investment program of 1.1 Md\u20ac by 2030 dedicated to new energy infrastructure, commissioning at least 100 MW per year of new renewable and battery storage capacity, targeting 1 GW installed in France by 2030. Projects include a 120 MW hub in Hauts-de-France combining two wind farms with battery storage, and a 110 MW hub in Nouvelle-Aquitaine combining three wind farms with storage.", "existing": "Yes, ENERTRAG has operated in France for over 25 years through its subsidiary ENERTRAG France (founded 2002, HQ in Cergy-Pontoise/Neuville-sur-Oise, around 120 employees), with regional offices near Amiens, Dijon and Lyon, a maintenance base in Saint-Quentin since 2018 and a remote monitoring center in Amiens since 2021. It has developed about 33 onshore wind farms (roughly 400-500 MW installed) and manages operations of around 537 MW across 44 wind farms.", "lat": 50.5, "lng": 3.0}, {"id": 36, "sector": "Energy / Renewables", "client": "Bioesol", "citizenship": "Mexican", "location": "Grenoble", "region": "Auvergne-Rh\u00f4ne-Alpes", "capex": 0, "capex_display": "200 M\u20ac", "description": "Acceleration of its European expansion from its strategic base in Grenoble, with plans to finance up to 200 M\u20ac for energy transition, energy autonomy and operational resilience projects through its Energy-as-a-Service model, including a direct investment of 40 M\u20ac, enabling industries to deploy localized energy infrastructure.", "existing": "Yes, BioEsol (founded 2021 in Mexico) has operated its European hub in the Grenoble area since 2022 via its subsidiary BioEsol Energy, with offices in Montbonnot-Saint-Martin and since November 2024 at Village by CA Grenoble, and has relocated its holding company to Paris. At Choose France 2025 it had already committed 35 M\u20ac of investment, 50 jobs in Isere and 50 M\u20ac of customer financing under its Energy-as-a-Service model.", "lat": 48.8, "lng": 2.5}, {"id": 37, "sector": "Energy / Renewables", "client": "Octopus Energy", "citizenship": "British", "location": "TBC", "region": "TBC", "capex": 0, "capex_display": "150 M\u20ac", "description": "Plans to invest up to 150 M\u20ac to build a Cosy heat pump factory in France once installation volumes materialise, with the ambition of deploying 10,000 Octopus-made Cosy heat pumps across the country within 12 months together with installer partners.", "existing": "Yes, operating since the January 2022 acquisition of French green electricity supplier Plum energie (rebranded Octopus Energy France): an energy retail business with over 600,000 customers, 400+ employees and offices in Paris, Lille, Amiens, Tours, Orleans, Rennes, Rouen and Reims. No manufacturing presence to date; the Cosy heat pump plant would be its first factory in France.", "lat": 48.8, "lng": 2.5}, {"id": 38, "sector": "Energy / Renewables", "client": "Alfa Laval", "citizenship": "Swedish", "location": "Golbey (main project), plus Fontanil, Nevers, Chalon and Elancourt", "region": "Multiple", "capex": 0, "capex_display": "50 M\u20ac", "description": "Investment plan of nearly 50 M\u20ac across its five French production sites for 2026-2028, led by the extension of the Golbey plant to serve the industrial gas and LNG markets, creating around 50 jobs, alongside decarbonisation, modernisation and digitalisation projects at the other four sites.", "existing": "Yes, present in France since 1907 with the five production sites covered by this plan already in operation: Nevers (spiral heat exchangers, first French plant since 1947), Fontanil-Cornillon (Vicarb plate heat exchangers, in the group since 1999), Chalon-sur-Saone (Packinox), Elancourt (Moatti filtration) and Golbey (cryogenics, acquired from Fives in July 2025, about 380 employees). Total French headcount is reported between roughly 900 and 1,500 employees.", "lat": 48.8, "lng": 2.5}, {"id": 39, "sector": "Energy / Renewables", "client": "Danfoss", "citizenship": "Danish", "location": "Reyrieux", "region": "Auvergne-Rh\u00f4ne-Alpes", "capex": 0, "capex_display": "10 M\u20ac", "description": "Investment of 10 M\u20ac over three years at its Reyrieux site, which produces key components for residential, industrial and commercial heat pumps, adding to 61 M\u20ac already invested in France since 2015. The program includes on-site renewable energy supply, energy efficiency improvements and workplace modernization, supporting France's target of over one million heat pump units per year by 2030.", "existing": "Yes, long-established manufacturing presence: Danfoss has produced compressors for heat pumps, air conditioning and refrigeration in France since acquiring Maneurop in 1993, with the Reyrieux plant (opened 1978, about 430 employees, around 270,000 compressors per year), a plant opened in Anse in 1989, and an ATEX testing laboratory plus a global refrigerant qualification center in Trevoux. The group has invested 61 M EUR in its French activities since 2015, including R&D and production capacity upgrades.", "lat": 48.8, "lng": 2.5}, {"id": 40, "sector": "Energy / Renewables", "client": "Baker Hughes", "citizenship": "American", "location": "Le Creusot and Fougerolles", "region": "Bourgogne-Franche-Comt\u00e9", "capex": 0, "capex_display": "TBC", "description": "Three-year investment plan in France covering the extension and modernization of industrial infrastructure, new production equipment and a new assembly and testing building at Le Creusot (Sa\u00f4ne-et-Loire), plus R&D investments in its zero-emission compression center of excellence, with increased production capacity and energy-saving measures at Fougerolles (Haute-Sa\u00f4ne).", "existing": "Yes, long-established industrial footprint: the Thermodyn compressor plant in Le Creusot (founded 1836, about 480 employees, roughly 250 MEUR revenue, its zero-emission compression center of excellence) and the Lufkin France gears plant in Fougerolles (manufacturing since 1965), both inherited via GE acquisitions. The 2026 announcement is a reinvestment in these two existing Bourgogne-Franche-Comt\u00e9 sites, listed in the press kit under foreign companies reinvesting in their industrial base.", "lat": 48.8, "lng": 2.5}, {"id": 41, "sector": "Energy / Electrical equipment", "client": "El Sewedy", "citizenship": "Egyptian", "location": "Paris", "region": "\u00cele-de-France", "capex": 0, "capex_display": "TBC", "description": "Opening of a legal entity in Paris, chosen as a strategic hub toward both Europe and French-speaking Africa, to centralize global trading of its electrical products, cables and transformers, strengthening large-scale trade flows and the supply of essential infrastructure solutions.", "existing": "First investment in France: the Paris legal entity announced at Choose France 2026 is Elsewedy Electric's first direct establishment in the country, with all 31 of its production facilities located outside France (Egypt, Algeria, Gulf, Asia, East Africa). Prior French links were limited to cable sales through a distributor network and a roughly 20 year commercial partnership with the French lightning protection firm INDELEC.", "lat": 48.8566, "lng": 2.3522}, {"id": 42, "sector": "Decarbonation", "client": "Ecolab", "citizenship": "American", "location": "Fos-sur-Mer and Hambach", "region": "Multiple", "capex": 0, "capex_display": "100 M\u20ac", "description": "Investment of 100 M\u20ac in GravitHy, a low-carbon iron producer whose Fos-sur-Mer plant will produce 2 million tonnes of green iron per year from 2030, and in HoloSolis, a photovoltaic panel manufacturer whose Hambach plant will reach an annual capacity of 10 million panels. Supports industrial decarbonation and around 2,500 skilled jobs.", "existing": "Yes, Ecolab has operated in France for around 60 years, with its largest European production plant in Chalons-en-Champagne (cleaning and hygiene chemicals, roughly 200 employees, 12 M\u20ac upgrade in 2015) and French corporate offices in Ile-de-France (Issy-les-Moulineaux). Since acquiring Laboratoires Anios in 2017 it also runs an international infection-prevention R&D center and a European healthcare production site at Sainghin-en-Melantois (Nord).", "lat": 48.8, "lng": 2.5}, {"id": 43, "sector": "Life Sciences / Pharma", "client": "Boehringer Ingelheim", "citizenship": "German", "location": "Jonage, Saint-Priest, Toulouse, Saint-Vulbas", "region": "Multiple", "capex": 0, "capex_display": "500 M\u20ac", "description": "Investment program of 500 M\u20ac by 2030 dedicated to animal health across four French sites: 20 M\u20ac more for the new Jonage foot-and-mouth antigen site (operational 2027, 150 highly skilled jobs), over 250 M\u20ac at Saint-Priest for veterinary antigen production, over 160 M\u20ac in Toulouse to multiply oral solutions volumes by five and triple tablet production, and about 40 M\u20ac for R&D in the Lyon region.", "existing": "Yes, a long-established footprint: the French headquarters and the global Animal Health headquarters sit in the Lyon area, which holds about 1,500 of its French staff and six of its nine French sites, including the Saint-Priest veterinary-vaccine R&D and production centre (roughly 700 employees), Lentilly, Saint-Vulbas, and the historic Lyon-Gerland site. The animal health business derives from the 2017 acquisition of Sanofi's Merial unit (Lyon vaccine heritage dating to 1947), and the group also operates a clinical research centre in Reims plus human-health activities headquartered in Paris.", "lat": 43.6047, "lng": 1.4422}, {"id": 44, "sector": "Life Sciences / Pharma", "client": "Sandoz", "citizenship": "Swiss", "location": "Toulouse", "region": "Occitanie", "capex": 0, "capex_display": "150 M\u20ac", "description": "Additional investment of about 150 M\u20ac by 2034 to continue the ramp-up of its Toulouse biosimilars development and production site, bringing total planned investment in France since December 2025 to about 550 M\u20ac, on top of the 300 M\u20ac announced for the acquisition of the site from Evotec SE and 250 M\u20ac of milestone payments. The site, now Sandoz Biologics France, features an innovative continuous production platform.", "existing": "Yes, a longstanding French commercial subsidiary (Sandoz SAS) headquartered in Levallois-Perret with roughly 250 to 300 employees, distributing generic and biosimilar medicines. Sandoz also acquired the Toulouse biologics production site (former Just-Evotec Biologics) in December 2025, just ahead of this announcement.", "lat": 43.6047, "lng": 1.4422}, {"id": 45, "sector": "Life Sciences / Pharma", "client": "GSK", "citizenship": "British", "location": "\u00c9vreux, Mayenne, Saint-Amand-les-Eaux", "region": "Multiple", "capex": 0, "capex_display": "140 M\u20ac", "description": "Additional investment of nearly 140 M\u20ac in France, bringing the planned 2026-2028 total to nearly 550 M\u20ac. 74.1 M\u20ac will strengthen the \u00c9vreux, Mayenne and Saint-Amand-les-Eaux sites and 63.6 M\u20ac will go to R&D, on top of amounts announced at previous Choose France editions for modernization, decarbonation and digitalization.", "existing": "Yes, long-established: 3 factories (\u00c9vreux, inhaled respiratory medicines, since 1968, ~1,100 staff; Mayenne, antibiotics, since 1960, ~400 staff; Saint-Amand-les-Eaux, vaccines, opened 2011 after a 600 M\u20ac investment, ~1,000 staff) plus the French HQ in Rueil-Malmaison (~870 staff). Over 3,400 employees in France in total, with investments from previous Choose France editions already being deployed.", "lat": 48.8, "lng": 2.5}, {"id": 46, "sector": "Life Sciences / Pharma", "client": "Stallergenes Greer", "citizenship": "Swiss", "location": "TBC", "region": "TBC", "capex": 0, "capex_display": "125 M\u20ac", "description": "Strategic investment of 125 M\u20ac to strengthen its industrial base in allergy treatment, including new production lines, an energy transition and expanded industrial capacity leading to job creation. The group employs 610 people in France and already plans a 12 percent headcount increase in 2026, aiming to make France the global heart of allergen immunotherapy.", "existing": "Yes. Stallergenes Greer has run its main industrial and R&D complex in Antony (Hauts-de-Seine, Ile-de-France) since 1962, employing 610 people in France (around 400 in industrial roles) and producing allergen immunotherapy treatments exported to over 40 countries. The 125 M euro plan expands and modernises this long-standing site rather than creating a new footprint.", "lat": 48.8, "lng": 2.5}, {"id": 47, "sector": "Life Sciences / Pharma", "client": "Sartorius AG", "citizenship": "German", "location": "Aubagne, Illkirch and other French sites", "region": "Multiple", "capex": 0, "capex_display": ">50 M\u20ac", "description": "Multi-year capacity expansion program of more than 50 M\u20ac across its seven French sites (1,400 employees), notably Aubagne (modernization of fluid management technology production and a new automated logistics center) and Illkirch (GMP-compliant facility for transfection reagents), with part of the investment dedicated to R&D.", "existing": "Yes, a long-established footprint through subsidiary Sartorius Stedim Biotech, whose Aubagne headquarters traces back to Stedim (founded in Aubagne in 1978, merged with Sartorius Biotech in 2007), running seven French sites with about 1,400 employees including production and R&D at Aubagne (over 1,100 staff), Illkirch, Lourdes, Cergy and Pompey. A new 90,000 sqm, 200 M EUR Aubagne headquarters was inaugurated in June 2025, well ahead of this 2026 expansion announcement.", "lat": 48.8, "lng": 2.5}, {"id": 48, "sector": "Life Sciences / Pharma", "client": "PTC Therapeutics", "citizenship": "American", "location": "Saint-Vulbas", "region": "Auvergne-Rh\u00f4ne-Alpes", "capex": 0, "capex_display": "45 M\u20ac", "description": "Industrial investment of 45 M\u20ac in France by 2030 to produce the active ingredient of its new phenylketonuria treatment at the Siegfried site in Saint-Vulbas (Ain), which employs 150 people. The output will serve European and international markets and eventually represent 30 to 40 percent of worldwide production, bringing new continuous chemistry processes to the site.", "existing": "Yes, a commercial and distribution subsidiary (PTC Therapeutics France) based in Paris since 2014, employing around 7 people and acting as a pharmaceutical product distributor (turnover circa 6.4M euros in 2024). It had no prior manufacturing footprint in France, and the announced 45M euro industrial investment will be carried out at a third-party Siegfried CDMO plant in Saint-Vulbas rather than a PTC-owned site.", "lat": 48.8, "lng": 2.5}, {"id": 49, "sector": "Life Sciences / Pharma", "client": "Adragos Pharma", "citizenship": "German", "location": "Maisons-Alfort", "region": "\u00cele-de-France", "capex": 0, "capex_display": "40-60 M\u20ac", "description": "Acquisition of the Maisons-Alfort sterile products site from Sanofi, producing commercial batches including prefilled syringes and vials. The CDMO plans to invest 40 to 60 M\u20ac over the next five years to build biologics manufacturing capabilities and increase production capacity through targeted equipment upgrades, preserving skilled jobs.", "existing": "Yes, Adragos already operated a sterile-manufacturing plant in Livron-sur-Drome (Auvergne-Rhone-Alpes), acquired around 2020 (formerly Haupt Pharma), employing roughly 230 people in sterile liquids and suppositories. The Maisons-Alfort deal is therefore an expansion of an existing French footprint, not a first investment.", "lat": 48.8, "lng": 2.5}, {"id": 50, "sector": "Life Sciences / Pharma", "client": "Curium Pharma", "citizenship": "American", "location": "Saclay", "region": "\u00cele-de-France", "capex": 0, "capex_display": "32 M\u20ac", "description": "Investment of more than 32 M\u20ac to create a production line for Lutetium-177 based targeted radioligand therapy medicines at the Saclay site, strengthening France's nuclear medicine infrastructure and oncology innovation while contributing to European health sovereignty in critical technologies.", "existing": "Yes, Curium's global headquarters is in Paris and it employs over 750 people in France across 13 production sites, including its historic Saclay radiopharmaceutical plant (CIS bio international, operating since 1964 as a CEA legacy facility). The 2026 announcement expands this existing Saclay site rather than creating a first footprint.", "lat": 48.8, "lng": 2.5}, {"id": 51, "sector": "Life Sciences / MedTech", "client": "B. Braun Medical", "citizenship": "German", "location": "Chasseneuil-du-Poitou", "region": "Nouvelle-Aquitaine", "capex": 0, "capex_display": "20 M\u20ac", "description": "Strategic investment of nearly 20 M\u20ac at its Chasseneuil-du-Poitou site in the Vienne, dedicated to implantable access port systems. First phase covers construction of a new two-story industrial building with energy-efficient infrastructure targeting carbon neutrality, creating about 40 full-time equivalent jobs by 2031.", "existing": "Yes, established in France since 1976 with 5 industrial sites (Nogent-le-Rotrou, Chasseneuil-du-Poitou, Saint-Jean-de-Luz, Sarlat, Ludres), a Saint-Cloud head office and over 2,000 employees. The 2026 project expands its existing Chasseneuil-du-Poitou plant, which already produces implantable port chambers and vena cava filters.", "lat": 48.8, "lng": 2.5}, {"id": 52, "sector": "Life Sciences / Pharma", "client": "Chiesi", "citizenship": "Italian", "location": "La Chauss\u00e9e-Saint-Victor (near Blois)", "region": "Centre-Val de Loire", "capex": 0, "capex_display": "TBC", "description": "Creation of about one hundred additional jobs at its industrial site near Blois as new production lines for respiratory disease medicines come on stream. The lines will double production of inhaled drug devices from 2026, including a new generation of low-carbon metered-dose inhalers, targeting nearly 60 million units per year.", "existing": "Yes, long established: factory at La Chaussee-Saint-Victor since 1992 (about 220 plant staff, over 160M EUR invested in the past decade, 70M EUR extension inaugurated Nov 2025) plus French HQ in Bois-Colombes, with the subsidiary employing 560+ people across R&D, production and distribution. Prior Choose France investor (60M EUR pledged in 2023) and France's first pharma \"societe a mission\" since 2021.", "lat": 48.8, "lng": 2.5}, {"id": 53, "sector": "Life Sciences / Pharma", "client": "Luma Group", "citizenship": "American", "location": "Paris", "region": "\u00cele-de-France", "capex": 0, "capex_display": "TBC", "description": "The New York biotechnology investment fund announces its intention to establish its European headquarters in Paris, leveraging the French scientific ecosystem to accelerate development of new therapies with biotech companies, academic centers and clinical excellence centers across Europe, and fostering cross-border investment.", "existing": "First investment in France. Luma Group is a young New York biotechnology investment firm (founded around 2023) with a US-focused portfolio and no prior office or operations in France; the Paris office announced at Choose France 2026 will be its first European headquarters.", "lat": 48.8566, "lng": 2.3522}, {"id": 54, "sector": "Food / Agrifood", "client": "Mars", "citizenship": "American", "location": "Grand Est, Occitanie, Hauts-de-France, Centre-Val de Loire", "region": "Multiple", "capex": 0, "capex_display": ">100 M\u20ac", "description": "Investment of more than 100 M\u20ac across several regions: nearly 45 M\u20ac in Grand Est, more than 30 M\u20ac in Occitanie, 17 M\u20ac in Hauts-de-France and more than 7 M\u20ac in Centre-Val de Loire, to strengthen its footprint in France, support innovation, prepare future needs, adapt to the digital transition and pursue decarbonation.", "existing": "Yes, Mars has operated in France since 1973 and counts more than 4,000 employees across 9 sites including 8 factories: chocolate at Haguenau (1976), pet food at Saint-Denis-de-l'Hotel and Ernolsheim-Bruche, ice cream at Steinbourg (1989) and gum at Biesheim. The group already invested 130 M\u20ac in its French sites in 2024, prior to this announcement.", "lat": 50.5, "lng": 3.0}, {"id": 55, "sector": "Food / Agrifood", "client": "Ferrero", "citizenship": "Italian", "location": "Nieppe and Villers-\u00c9calles", "region": "Multiple", "capex": 0, "capex_display": "60 M\u20ac", "description": "New industrial investments of 60 M\u20ac creating two production lines in 2026: 30 M\u20ac in Nieppe (Hauts-de-France) for a new line dedicated to Nutella Cookies launching in the summer, and 30 M\u20ac in Villers-\u00c9calles (Normandie) for production of 3 kg Nutella formats for professionals, while continuing decarbonation investments at the Normandy site.", "existing": "Yes, present since 1959-1960 with about 1,400 employees in France: the Villers-\u00c9calles plant (Normandie) is the world's largest Nutella factory (around 350 plant staff, over a quarter of global Nutella output), alongside the French HQ near Rouen. Ferrero also owns the Nieppe biscuit plant (Hauts-de-France), acquired with Delacre in 2016.", "lat": 48.8, "lng": 2.5}, {"id": 56, "sector": "Food / Agrifood", "client": "Symrise", "citizenship": "German", "location": "Saint-C\u00e9zaire-sur-Siagne, Clichy, Berric", "region": "Multiple", "capex": 0, "capex_display": ">37 M\u20ac", "description": "More than 37 M\u20ac of investments in 2026: a 10 M\u20ac project expanding offices and laboratories for Fragrance and Care activities in Saint-C\u00e9zaire-sur-Siagne (PACA) and Clichy (\u00cele-de-France), making Clichy a global perfumery hub for 350 employees and creating about ten jobs, and a 27.5 M\u20ac project modernizing the Berric industrial site in Bretagne with 20 jobs created.", "existing": "Yes, long-standing multi-site footprint: a perfumery creation center in Clichy (about 350 staff), the historic fragrance ingredients site in Saint-Cezaire-sur-Siagne near Grasse, and a major Brittany base from the 2014 acquisition of French group Diana (then about 2,000 employees), including the Diana Food plant in Berric (100+ employees) and the Symrise Pet Food global HQ in Elven (about 434 staff). The 2026 projects are expansions and modernizations of these existing sites, not a market entry.", "lat": 48.8, "lng": 2.5}, {"id": 57, "sector": "Food / Agrifood", "client": "Vicky Foods", "citizenship": "Spanish", "location": "Fragnes-la-Loy\u00e8re", "region": "Bourgogne-Franche-Comt\u00e9", "capex": 0, "capex_display": "25 M\u20ac", "description": "Additional investment of 25 M\u20ac at Fragnes-la-Loy\u00e8re, the country's first turnkey industrial site, after an initial commitment of 100 M\u20ac. The site has already created 150 permanent jobs, with a ramp-up planned to 250 by 2030, in a three-phase project confirming the group's long-term ambitions on the French market.", "existing": "Yes, one operating bakery and pastry plant at Fragnes-la-Loyere (Saone-et-Loire), the group's first French factory, built from 2023 under the initial 100 M EUR phase and in production since 2025 with about 150-200 permanent employees. The 2026 announcement is a 25 M EUR expansion of this same site, which targets up to 1,000 direct jobs at full build-out.", "lat": 48.8, "lng": 2.5}, {"id": 58, "sector": "Food / Agrifood", "client": "Terramar", "citizenship": "Chilean", "location": "Mayenne", "region": "Pays de la Loire", "capex": 0, "capex_display": "14 M\u20ac", "description": "Investment of 14 M\u20ac to increase production capacity at the Poultry Feed Company plant in Mayenne, which produces processed animal proteins, creating 15 to 18 jobs and consolidating PFC's position among Europe's leading animal by-product processing plants.", "existing": "Yes, Terramar is already a shareholder of Poultry Feed Company (PFC), a poultry by-product rendering plant in Vaiges (Mayenne) operating since April 2021, built as a roughly 50 M EUR joint venture in which Terramar carried about half of the investment alongside French poultry group LDC. The 2026 announcement is a capacity expansion of this existing site, not a first investment in France.", "lat": 48.8, "lng": 2.5}, {"id": 59, "sector": "Agriculture / Agricultural machinery", "client": "Claas", "citizenship": "German", "location": "Several industrial sites in France", "region": "Multiple", "capex": 0, "capex_display": "50 M\u20ac", "description": "The agricultural machinery leader plans to invest 50 M\u20ac in France over the next three years across several industrial sites, to modernize and decarbonize facilities, strengthen manufacturing and logistics activities, and improve testing and validation capabilities with new equipment.", "existing": "Yes, CLAAS has manufactured tractors at its Le Mans plant (Sarthe) since acquiring Renault Agriculture in 2003 (100% by 2008), with about 850-870 employees plus a roughly 70-person R&D and validation centre in nearby Trange, and over 80 M EUR already invested in the site. The group also operates its French sales subsidiary and dealer network, making France its main tractor production base with nearly 200,000 units built there.", "lat": 48.8, "lng": 2.5}, {"id": 60, "sector": "Logistics", "client": "VGP", "citizenship": "Belgian", "location": "TBC", "region": "Multiple", "capex": 0, "capex_display": "1,5 Md\u20ac", "description": "Investment of over 1,5 Md\u20ac in France in high-quality business parks (of which 35% for industrial use), including 1 Md\u20ac by 2029 to deliver 1 million m2 of semi-industrial, business park and logistics buildings on 250 ha of brownfield land, creating 5,000 direct and 11,250 indirect jobs over six years; the full 1.5 million m2 of buildings will be delivered in two phases (2027 and 2031). VGP has already created 129 parks (10.3 million m2) in 17 other European countries.", "existing": "Yes, VGP entered France in 2022 with a Paris office and a country team under Aurelien Coudert, securing about 73 ha of land within two years and completing its first delivery of 40,000 m2 at VGP Park Rouen (Petit-Couronne) at end-2024. Its French pipeline already includes VGP Park Rouen (~150,000 m2), VGP Park Mulhouse on a former Stellantis site (~95,000 m2) and VGP Park Velizy-Villacoublay (~131,000 m2), alongside 129 parks (10.3 million m2) operated in 17 other European countries.", "lat": 48.8, "lng": 2.5}, {"id": 61, "sector": "Logistics", "client": "InPost (Mondial Relay)", "citizenship": "Polish", "location": "TBC", "region": "Multiple", "capex": 0, "capex_display": "500 M\u20ac", "description": "Plans to invest at least an additional 500 M\u20ac in France by 2030, focused on customer experience and automation of its distribution centres, creating at least 750 new jobs and bringing its total investment to 1,4 Md\u20ac.", "existing": "Yes, InPost has operated in France since acquiring Mondial Relay (founded 1997, HQ in Hem near Lille) from Otto Group in July 2021 for over 500 M\u20ac. The French network counts roughly 17,000 pickup points (about 9,000 lockers and 8,000 partner shops), 8 logistics hubs and some 49 sorting sites, with close to 3,000 employees at peak periods.", "lat": 48.8, "lng": 2.5}, {"id": 62, "sector": "Logistics", "client": "Amazon", "citizenship": "American", "location": "Pays de la Loire, \u00cele-de-France, Nouvelle-Aquitaine and Ensisheim", "region": "Multiple", "capex": 0, "capex_display": "400 M\u20ac", "description": "Three new logistics sites in Pays de la Loire, \u00cele-de-France and Nouvelle-Aquitaine which, together with the planned distribution centre in Ensisheim, represent over 400 M\u20ac of planned investment and will create more than 3,000 permanent jobs.", "existing": "Yes, Amazon has operated in France since 2000 and runs one of the country's largest logistics networks, with 8 fulfillment centers and around 35 logistics facilities before this announcement, plus corporate and R&D offices in the Paris area. It employs more than 25,000 permanent staff in France and reports over 30 billion euros invested in the country since 2010.", "lat": 48.5, "lng": 2.5}, {"id": 63, "sector": "Logistics", "client": "Boluda", "citizenship": "Spanish", "location": "French strategic ports", "region": "Multiple", "capex": 0, "capex_display": "250 M\u20ac", "description": "Investment programme of over 250 M\u20ac over three to five years to strengthen towage capacity in strategic French ports and support the modernisation of port infrastructure, aiming to make French ports global references, notably in safety.", "existing": "Yes, present since 2007 when Boluda took over the Les Abeilles harbour tug fleet from Bourbon: Boluda Towage France (head office Marseille, over 1,200 employees) operates around 40 tugs in Dunkirk, Le Havre, Brest, Nantes Saint-Nazaire, La Rochelle and Marseille-Fos, plus La Reunion and Mayotte. In 2024 it also acquired Les Abeilles International, the French deep-sea salvage and emergency towage operator serving the French Navy.", "lat": 48.8, "lng": 2.5}, {"id": 64, "sector": "Logistics", "client": "DHL Group", "citizenship": "German", "location": "TBC", "region": "Multiple", "capex": 0, "capex_display": "160 M\u20ac", "description": "Additional investment plan of about 160 M\u20ac over 2026-2027 to modernise its French infrastructure and pursue its ecological transition (sustainable aviation fuel, fleet electrification, charging stations, solar energy), bringing DHL's total investment in France to nearly 900 M\u20ac over ten years.", "existing": "Yes, DHL has operated in France since 1976; DHL Express France alone runs 56 sites with about 3,500 employees and a 43% market share, alongside Supply Chain, Global Forwarding and Freight activities. Recent completed projects include the 170 M EUR Paris-CDG express hub (2021) and a 121 M EUR air hub at Lyon-Saint-Exupery, within some 255 M EUR of infrastructure modernisation over the prior six years.", "lat": 48.8, "lng": 2.5}, {"id": 65, "sector": "Logistics", "client": "GXO", "citizenship": "American", "location": "Ferri\u00e8res-en-G\u00e2tinais, Onnaing and Montereau-sur-le-Jard", "region": "Multiple", "capex": 0, "capex_display": "TBC", "description": "Creation of over 1,000 jobs by 2027 through three major projects: a 60,000 m2 automated warehouse for Unilever in Ferrieres-en-Gatinais (about 200 hires), an 80,000 m2 site for Action in Onnaing (about 300 staff), and 500 hires planned by end 2026 at the Zalando site in Montereau-sur-le-Jard.", "existing": "Yes, GXO is a long-established contract logistics operator in France, with roots in Norbert Dentressangle (acquired by XPO in 2015, GXO spun off in 2021) and its French entity headquartered in Toulouse. It runs roughly 60 to 70 warehouses in France employing about 8,700 to 10,000 people.", "lat": 48.8, "lng": 2.5}, {         let filteredProjects = [...allProjects];
        let map;
        let markers = {};

        // Initialisation
        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            populateFilters();
            setupEventListeners();
            updateDisplay();
        });

        function initMap() {
            map = L.map('map').setView([46.5, 2.5], 6);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 18
            }).addTo(map);

            updateMarkers();
        }

        function populateFilters() {
            const sectors = [...new Set(allProjects.map(p => p.sector))].filter(Boolean).sort();
            const regions = [...new Set(allProjects.map(p => p.region))].filter(Boolean).sort();

            const sectorSelect = document.getElementById('sector-filter');
            const regionSelect = document.getElementById('region-filter');

            sectors.forEach(sector => {
                const option = document.createElement('option');
                option.value = sector;
                option.textContent = sector;
                sectorSelect.appendChild(option);
            });

            regions.forEach(region => {
                const option = document.createElement('option');
                option.value = region;
                option.textContent = region;
                regionSelect.appendChild(option);
            });
        }

        function setupEventListeners() {
            document.getElementById('sector-filter').addEventListener('change', applyFilters);
            document.getElementById('region-filter').addEventListener('change', applyFilters);
            document.getElementById('capex-filter').addEventListener('input', updateCapexDisplay);
            document.getElementById('capex-filter').addEventListener('change', applyFilters);
            document.getElementById('reset-filters').addEventListener('click', resetFilters);

            const modal = document.getElementById('project-modal');
            const closeBtn = document.querySelector('.close');

            closeBtn.addEventListener('click', () => {
                modal.classList.remove('show');
            });

            window.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('show');
                }
            });
        }

        function updateCapexDisplay() {
            const value = document.getElementById('capex-filter').value;
            document.getElementById('capex-value').textContent = value;
        }

        function applyFilters() {
            const sector = document.getElementById('sector-filter').value;
            const region = document.getElementById('region-filter').value;
            const capexMin = parseFloat(document.getElementById('capex-filter').value);

            filteredProjects = allProjects.filter(project => {
                const sectorMatch = !sector || project.sector === sector;
                const regionMatch = !region || project.region === region;
                const capexMatch = project.capex >= capexMin;

                return sectorMatch && regionMatch && capexMatch;
            });

            updateDisplay();
        }

        function resetFilters() {
            document.getElementById('sector-filter').value = '';
            document.getElementById('region-filter').value = '';
            document.getElementById('capex-filter').value = '0';
            document.getElementById('capex-value').textContent = '0';

            filteredProjects = [...allProjects];
            updateDisplay();
        }

        function updateDisplay() {
            updateMarkers();
            updateStatistics();
            updateProjectsList();
        }

        function updateMarkers() {
            Object.values(markers).forEach(marker => map.removeLayer(marker));
            markers = {};

            filteredProjects.forEach(project => {
                const marker = L.circleMarker([project.lat, project.lng], {
                    radius: 8,
                    fillColor: getColorByCapex(project.capex),
                    color: '#fff',
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.8
                });

                marker.bindPopup(createPopupContent(project));

                marker.on('click', () => {
                    showProjectModal(project);
                });

                markers[project.id] = marker;
                map.addLayer(marker);
            });
        }

        function getColorByCapex(capex) {
            if (capex >= 50) return '#d32f2f';
            if (capex >= 20) return '#f57c00';
            if (capex >= 10) return '#fbc02d';
            return '#558b2f';
        }

        function createPopupContent(project) {
            const div = document.createElement('div');
            div.className = 'popup-content';

            div.innerHTML = `
                <div class="popup-client">${project.client}</div>
                <div class="popup-section">
                    <span class="popup-section-label">Localisation:</span>
                    <span class="popup-section-value">${project.location}</span>
                </div>
                <div class="popup-section">
                    <span class="popup-section-label">Région:</span>
                    <span class="popup-section-value">${project.region}</span>
                </div>
                <div class="popup-section">
                    <span class="popup-section-label">Secteur:</span>
                    <span class="popup-section-value">${project.sector}</span>
                </div>
                <div class="popup-section">
                    <span class="popup-section-label">CAPEX:</span>
                    <span class="popup-section-value">${project.capex_display}</span>
                </div>
                <div class="popup-description">
                    ${project.description}
                </div>
            `;

            return div;
        }

        function showProjectModal(project) {
            const modal = document.getElementById('project-modal');
            const modalBody = document.getElementById('modal-body');

            modalBody.innerHTML = `
                <h2>${project.client}</h2>
                <div class="detail-section">
                    <div class="detail-label">Secteur</div>
                    <div class="detail-value">${project.sector}</div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">Localisation</div>
                    <div class="detail-value">${project.location}</div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">Région</div>
                    <div class="detail-value">${project.region}</div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">Nationalité du client</div>
                    <div class="detail-value">${project.citizenship}</div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">CAPEX</div>
                    <div class="detail-value">${project.capex_display}</div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">Description du projet</div>
                    <div class="detail-value">${project.description}</div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">Projets existants en France</div>
                    <div class="detail-value">${project.existing}</div>
                </div>
            `;

            modal.classList.add('show');
        }

        function updateStatistics() {
            const projectsCount = filteredProjects.length;
            const capexTotal = filteredProjects.reduce((sum, p) => sum + p.capex, 0).toFixed(1);
            const regionsCount = new Set(filteredProjects.map(p => p.region)).size;

            document.getElementById('projects-count').textContent = projectsCount;
            document.getElementById('capex-total').textContent = capexTotal;
            document.getElementById('regions-count').textContent = regionsCount;
        }

        function updateProjectsList() {
            const projectsList = document.getElementById('projects-list');
            projectsList.innerHTML = '';

            filteredProjects
                .sort((a, b) => b.capex - a.capex)
                .forEach(project => {
                    const item = document.createElement('div');
                    item.className = 'project-item';
                    item.innerHTML = `
                        <div class="client">${project.client}</div>
                        <div class="location">📍 ${project.location}</div>
                        <div class="capex">${project.capex_display}</div>
                    `;

                    item.addEventListener('click', () => {
                        showProjectModal(project);
                        const marker = markers[project.id];
                        if (marker) {
                            map.setView([project.lat, project.lng], 10);
                        }
                    });

                    projectsList.appendChild(item);
                });
        }
    </script>
</body>
</html>
